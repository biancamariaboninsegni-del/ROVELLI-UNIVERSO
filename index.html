<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universo di Bianca — Buchi Bianchi</title>
    <style>
        /* CSS: Il corpo del tuo universo */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            cursor: none; /* Nascondiamo il cursore per un effetto più immersivo */
        }

        /* HUD: Messaggio di benvenuto */
        #hud {
            position: absolute;
            top: 30px; left: 30px;
            color: rgba(255, 255, 255, 0.4);
            pointer-events: none;
            z-index: 10;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 12px;
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            padding-left: 15px;
        }

        /* Overlay del Buco Bianco */
        #whitehole {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, rgba(0, 0, 0, 1) 80%);
            color: #fff;
            visibility: hidden;
            opacity: 0;
            transition: opacity 1.2s ease, visibility 1.2s;
            text-align: center;
        }

        #whitehole.visible {
            visibility: visible;
            opacity: 1;
        }
