<!DOCTYPE html>
<html>
<head>
    <title>Universo Bianca Test</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; color: white; font-family: sans-serif; }
        canvas { display: block; }
        #debug { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.5); padding: 10px; }
    </style>
</head>
<body>
    <div id="debug">Se vedi questo testo e un cerchio bianco che segue il mouse, il codice funziona.</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let w, h;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        let mouse = { x: w/2, y: h/2 };
        window.onmousemove = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };

        function draw() {
            // Sfondo semitrasparente per l'effetto scia
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
            ctx.fillRect(0, 0, w, h);

            // Disegna il fascio di luce semplificato
            ctx.beginPath();
            const grad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 150);
            grad.addColorStop(0, 'rgba(255, 255, 255, 0.2)');
            grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = grad;
            ctx.arc(mouse.x, mouse.y, 150, 0, Math.PI * 2);
            ctx.fill();

            // Disegna una particella di "polvere"
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(mouse.x + Math.sin(Date.now()/500)*50, mouse.y + Math.cos(Date.now()/500)*50, 2, 0, Math.PI*2);
            ctx.fill();

            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
